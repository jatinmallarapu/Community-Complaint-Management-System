<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h2>Admin Login</h2>
    <form id="loginForm">
        <label for="username">Username:</label>
        <input type="text" id="username" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" required><br><br>

        <button type="submit">Login</button>
    </form>

    <p id="message" style="color:red;"></p>

    <script>
      let csrfToken="";
      let csrfHeader ="";
      const fetchCsrfToken= async function(){
        try {
          const response = await fetch('http://localhost:8080/CCM/csrfToken', {
            method: 'GET',
            credentials: 'include'
          });
          if (response.ok) {
            const data = await response.json();
            csrfToken = data.token;
            csrfHeader = data.headerName;

            sessionStorage.setItem('csrfToken', csrfToken);
            sessionStorage.setItem('csrfHeader', csrfHeader);
          } else {
            console.error('Failed to fetch CSRF token');
          }
        } catch (error) {
          console.error('Error fetching CSRF token:', error);
        }
      }

      document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        await fetchCsrfToken();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
      
        try {
          headers={"Content-Type": "application/json"};
          headers[csrfHeader] = csrfToken;
          const user={
            adminname: username,
            password: password
          }
          const response = await fetch('http://localhost:8080/CCM/admin/login', {
            method: 'POST',
            headers: headers,
            credentials: 'include',
            body: JSON.stringify(user)
          });

          const result = await response.text();
          if(result==="Success"){
            sessionStorage.setItem('adminname', username);
            document.getElementById('message').textContent = result;
            window.location.href = 'http://127.0.0.1:5500/admin-dashboard.html';
          } else {
            document.getElementById('message').textContent = result;
          }
        }
        catch (error) {
            console.error('Error during login:', error);
            document.getElementById('message').textContent = 'An error occurred during login.';
          }
          
      });


    </script>
</body>
</html>
